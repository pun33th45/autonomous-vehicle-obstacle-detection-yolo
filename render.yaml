# ============================================================
# Render Blueprint — Autonomous Vehicle Obstacle Detection
# Deploy via: https://dashboard.render.com/select-repo
#
# Runtime: Python 3.11 (native)
# Memory strategy:
#   torch + ultralytics are INSTALLED (via requirements.txt) but the
#   Streamlit process never imports them.  On first request, load_model()
#   spawns a subprocess to export yolov8n.pt → yolov8n.onnx (subprocess
#   uses ~300 MB peak then exits).  All inference uses onnxruntime (~40 MB).
#   Main process runtime RAM: ~180 MB (well under Render's 512 MB free limit).
# ============================================================

services:
  - type: web
    name: autonomous-obstacle-detection
    env: python
    plan: free
    region: oregon
    healthCheckPath: /_stcore/health

    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --server.fileWatcherType=none --server.maxUploadSize=50

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
